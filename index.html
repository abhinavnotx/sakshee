<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sakshee ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* STAR BACKGROUND */
#stars-canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
    pointer-events: none;
}

/* LOCK SCREEN - Highest Z-Index to ensure it works */
#lock-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999; 
    transition: opacity 1s;
}

#pass-input {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    text-align: center;
    margin-bottom: 15px;
    color: black;
}

#unlock-btn {
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

/* MAIN CONTAINER */
#main-container {
    display: none;
    position: relative;
    z-index: 10;
}

/* CAKE SCREEN */
#cake-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: opacity 1s;
}

.cake-container {
    position: relative;
    width: 250px;
    height: 300px;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
}

.layer {
    position: absolute;
    background-color: #ffdde1;
    border-radius: 20px 20px 10px 10px;
    border: 3px solid #ff4d6d;
    transition: transform 1s ease-out, opacity 1s;
}

.layer-bottom { bottom: 0; width: 220px; height: 80px; z-index: 10; }
.layer-middle { bottom: 80px; width: 170px; height: 70px; z-index: 20; }
.layer-top { bottom: 150px; width: 120px; height: 60px; z-index: 30; }

.candle {
    position: absolute;
    width: 8px;
    height: 40px;
    background: repeating-linear-gradient(45deg, #ffdde1, #ffdde1 5px, #ff4d6d 5px, #ff4d6d 10px);
    top: 110px;
    z-index: 40;
}
.c1 { left: 80px; } .c2 { left: 115px; } .c3 { left: 150px; }

.flame {
    position: absolute;
    top: -15px;
    left: -3px;
    width: 14px;
    height: 20px;
    background: radial-gradient(#ffff00, #ff8800);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 0.1s infinite alternate;
}

@keyframes flicker {
    to { transform: scale(1.1); opacity: 0.8; }
}

/* FIREWORKS LAYER */
#fireworks-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 50;
    pointer-events: none;
    display: none;
}

/* MAIN CONTENT */
#content-screen {
    opacity: 0;
    text-align: center;
    padding: 100px 20px;
    transition: opacity 1.5s;
    z-index: 20;
}

.message {
    white-space: pre-line;
    line-height: 1.8;
    font-size: 17px;
    max-width: 800px;
    margin: 30px auto;
    text-align: left;
}

.slideshow img {
    width: 100%;
    max-width: 400px;
    border-radius: 15px;
    display: none;
    margin: auto;
    box-shadow: 0 0 20px rgba(255, 77, 109, 0.3);
}

.heart {
    position: fixed;
    color: #ff4d6d;
    z-index: 999;
    pointer-events: none;
    animation: float 5s linear forwards;
}

@keyframes float {
    0% { transform: translateY(110vh) scale(0); opacity: 0; }
    10% { transform: translateY(90vh) scale(1); opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* Cake Cutting Animation */
.cake-cut .layer-top { transform: translate(-30px, -30px) rotate(-10deg); }
.cake-cut .layer-middle { transform: translate(30px, -15px) rotate(10deg); }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="lock-screen">
    <h2>Enter Password ❤️</h2>
    <input type="password" id="pass-input" placeholder="****">
    <button id="unlock-btn">Enter</button>
</div>

<div id="main-container">
    
    <div id="fireworks-container">
        <canvas id="fireworks-canvas"></canvas>
    </div>

    <div id="cake-screen">
        <h2 style="color: #ffdde1;">Sakshee, make a wish...</h2>
        <div class="cake-container" id="celebration-cake">
            <div class="layer layer-bottom"></div>
            <div class="layer layer-middle"></div>
            <div class="layer layer-top"></div>
            <div class="candle c1"><div class="flame"></div></div>
            <div class="candle c2"><div class="flame"></div></div>
            <div class="candle c3"><div class="flame"></div></div>
        </div>
        <div style="margin-top: 50px;">
            <button id="blow-btn" style="padding:12px 25px; border-radius:20px; border:none; background:#ff4d6d; color:white; font-weight:bold; cursor:pointer;">Blow Candles 💨</button>
            <button id="cut-btn" style="padding:12px 25px; border-radius:20px; border:none; background:#ffc107; color:white; font-weight:bold; cursor:pointer; display:none;">Cut Cake 🔪</button>
        </div>
    </div>

    <div id="content-screen">
        <h1>Happy Birthday Sakshuu!!!💗💗</h1>
        <div id="text" class="message"></div>
        
        <div style="margin-top:80px;">
            <h2>Our Moments 📸</h2>
            <div class="slideshow" id="slideshow">
                <img src="https://i.postimg.cc/QxzpqtZK/Snapchat-679765657.jpg" style="display: block;">
                <img src="https://via.placeholder.com/400x500?text=Your+Photo+2">
                <img src="https://via.placeholder.com/400x500?text=Your+Photo+3">
            </div>
        </div>

        <div style="margin-top:80px;">
            <h2>One Thing I Want</h2>
            <p>Take care of yourself! Cause a smile looks pretty on YOU!😚🫶🏻✨</p>
        </div>
    </div>

    <audio id="bg-music" loop><source src="Tum Ho Toh Movie Saiyaara.m4a" type="audio/mp4"></audio>
    <audio id="voice"><source src="voice.mp3" type="audio/mp3"></audio>
    <audio id="fireworks-sound"><source src="fireworks.mp3" type="audio/mp3"></audio>
</div>

<script>
const msg = `A VERYY VERYY HAPPY HAPPYY BIRTHDAY SAKSHEE!!!💕✨

May this year be full of happiness, caring, love and immense blessings!🫶🏻

Hope soo, you remain as chunky, as cute and mine the whole life!!💫

But, this time there's something more than a birthday wish from my side to you..🤧

I’ve been thinking a lot about what to say today… and honestly, no matter how many words I write, it still feels like it won’t be enough for you. Because what you mean to me isn’t something simple or small that can be wrapped in just a few lines.

You came into my life so naturally, without any force, without any expectations… and slowly, you became someone I can’t ignore, someone I can’t replace, someone I don’t even want to imagine losing. What we have might not have a label, but it has a depth that many “labeled” relationships don’t even reach.

You’re not just special to me… you’re IMPORTANT. And I don’t say that lightly.💌

I know you don’t always express what you feel. I know you keep things inside, even when something is bothering you, even when you’re sad. You act normal, you stay quiet, and sometimes you just carry everything on your own. But I see it… maybe not always clearly, but I feel it. And I want you to know this—you don’t have to do that with me.

You can tell me when you’re not okay. You can tell me when something hurts. You can even stay silent on call and just exist—I’ll still be there. I don’t need you to be “perfect” or “strong” all the time. I just want you to be real with me.

Because trust isn’t built only on good moments… it’s built when you let someone see your bad days too.

And if there’s even a small part of you that holds back because you think “what’s the point” or “he won’t understand”… I want to change that. Slowly, patiently—but I want to be that person for you.😚🫶🏻

I also know… somewhere in your mind, you doubt things. You wonder if I’ll stay the same, if I’ll be there for long, if I’ll eventually change like people usually do. And honestly, I understand why you’d feel that way.

But let me tell you something clearly today—

I don’t look at you like just another girl in my life.
I don’t talk to you like you’re replaceable.
And I definitely don't feel for anyone the way I feel for you.

For me, it’s YOU and only YOU SAKSHEE. It has been you.💗💗

Out of everyone, you’re the one I choose to stay for, to care for, to give my time and energy to. Not because I have to… but because I genuinely want to.

I’m not here for something temporary. I’m not here just for good conversations or timepass. I’m here because you matter to me in a way that's rare, and I don’t take that lightly.

At the same time, I don’t want you to feel pressured or forced to say anything back. But today… on your birthday… I do want one thing from you.

Be honest with me.

Not perfect, not filtered—just honest.

If you feel something, say it.
If you’re confused, say it.
If you’re scared, say it.
If you’re happy because of me… say that too.

I don’t want guesses between us. I want understanding.🤧

Because what we have deserves that much honesty.✨

You’ve become a part of my daily life in a way I didn’t even realize at first. Your presence, your small things, even your silence—it all matters to me more than you probably think.💕

And today, I just want you to feel loved, valued, and seen… not just by people around you, but by me—someone who genuinely cares about you, deeply.

Stay the way you are. Don’t change yourself for anyone. The version of you that I know… is already enough, more than enough.

Be healthy and hydrated always!!😭🫂

And no matter where life goes, no matter what changes around us… one thing I can promise(you said me to don't, but yk adat se majboor..i will😭💕)you is this—

I’m not going anywhere!!

Happy Birthday once again, Sakshuuuuuu!!!! 🎂✨
You really mean a lot to me… more than words can ever fully explain.

LOVEEEE YOUUUUUUUUUU!!!💗💗💗💗💗💗🫂🫂🫂

                       -Your Pagal
                       -Your Alien
                       -Your Senior🤧`;

// Unlock Logic
document.getElementById("unlock-btn").addEventListener("click", () => {
    const pass = document.getElementById("pass-input").value.toUpperCase();
    if (pass === "LOVE") {
        document.getElementById("lock-screen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("lock-screen").style.display = "none";
            document.getElementById("main-container").style.display = "block";
            document.getElementById("cake-screen").style.opacity = "1";
            document.getElementById("cake-screen").style.visibility = "visible";
            document.getElementById("bg-music").play();
        }, 1000);
    } else {
        alert("Wrong Password! Hint: 4 letters ending in VE");
    }
});

// Cake Logic
document.getElementById("blow-btn").addEventListener("click", () => {
    document.querySelectorAll(".flame").forEach(f => f.style.opacity = "0");
    document.getElementById("blow-btn").style.display = "none";
    document.getElementById("cut-btn").style.display = "inline-block";
});

document.getElementById("cut-btn").addEventListener("click", () => {
    document.getElementById("celebration-cake").classList.add("cake-cut");
    startCelebration();
});

function startCelebration() {
    document.getElementById("fireworks-container").style.display = "block";
    document.getElementById("fireworks-sound").play();
    initFireworks(); 
    
    // 10 Seconds of Fireworks
    setTimeout(() => {
        document.getElementById("fireworks-container").style.display = "none";
        document.getElementById("cake-screen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("cake-screen").style.display = "none";
            document.getElementById("content-screen").style.opacity = "1";
            typeText();
            startHearts();
            startSlideshow();
        }, 1000);
    }, 10000);
}

// Typing
let n=0;
function typeText(){
    if(n < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(n);
        n++;
        setTimeout(typeText, 35);
    } else {
        document.getElementById("voice").play();
    }
}

// Hearts
function startHearts(){
    setInterval(()=>{
        let h = document.createElement("div");
        h.innerHTML = "💗";
        h.className = "heart";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (15 + Math.random() * 20) + "px";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 5000);
    }, 400);
}

// Slideshow
let s=0;
function startSlideshow(){
    let imgs = document.querySelectorAll("#slideshow img");
    setInterval(() => {
        imgs.forEach(i => i.style.display = "none");
        s = (s + 1) % imgs.length;
        imgs[s].style.display = "block";
    }, 3000);
}

// Star BG
const c = document.getElementById("stars-canvas");
const ctx = c.getContext("2d");
c.width = window.innerWidth; c.height = window.innerHeight;
const stars = Array(150).fill().map(() => ({ x: Math.random()*c.width, y: Math.random()*c.height, r: Math.random()*1.5, o: Math.random() }));
function drawStars() {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${Math.abs(Math.sin(s.o))})`;
        s.o += 0.02;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(drawStars);
}
drawStars();

// Fireworks Canvas Logic
const fc = document.getElementById("fireworks-canvas");
const fctx = fc.getContext("2d");
fc.width = window.innerWidth; fc.height = window.innerHeight;
let particles = [];
function initFireworks() {
    function createP() {
        if(particles.length > 200) return;
        const x = Math.random() * fc.width;
        const y = Math.random() * (fc.height/2);
        const color = `hsl(${Math.random()*360}, 100%, 50%)`;
        for(let i=0; i<30; i++) {
            particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, color, life: 1});
        }
    }
    function draw() {
        fctx.fillStyle = "rgba(0,0,0,0.2)";
        fctx.fillRect(0,0,fc.width,fc.height);
        particles.forEach((p, i) => {
            fctx.fillStyle = p.color;
            fctx.globalAlpha = p.life;
            fctx.beginPath(); fctx.arc(p.x, p.y, 2, 0, Math.PI*2); fctx.fill();
            p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
        if(Math.random() < 0.1) createP();
        if(document.getElementById("fireworks-container").style.display === "block") requestAnimationFrame(draw);
    }
    draw();
}
</script>
</body>
</html>
