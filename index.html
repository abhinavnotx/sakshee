<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sakshee ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* STAR BG */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* LOCK */
#lock {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: 1s;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* MAIN */
#main {
    display: none;
    text-align: center;
}

/* INTRO */
#intro {
    margin-top: 120px;
    font-size: 24px;
    opacity: 0;
    animation: fade 3s forwards;
}

/* TITLE */
h1 {
    margin-top: 40px;
    font-size: 42px;
}

/* TEXT */
#text {
    max-width: 800px;
    margin: 30px auto;
    line-height: 1.8;
    font-size: 18px;
    padding: 0 20px;
}

/* SECTIONS */
.section {
    margin-top: 80px;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}
.show {
    opacity: 1;
    transform: translateY(0);
}

/* SLIDESHOW */
.slideshow {
    width: 80%;
    max-width: 500px;
    margin: auto;
}
.slideshow img {
    width: 100%;
    border-radius: 15px;
    display: none;
    transition: 0.5s;
}
.slideshow img:hover {
    transform: scale(1.05);
}

/* SECRET BUTTON */
#secret {
    position: fixed;
    bottom: 20px;
    right: 20px;
    opacity: 0.2;
    font-size: 12px;
    cursor: pointer;
}
#secret:hover {
    opacity: 1;
}

/* HEARTS */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* FADE */
@keyframes fade {
    to {opacity: 1;}
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- LOCK -->
<div id="lock">
    <h2>Enter Password ❤️</h2>
    <input type="password" id="pass">
    <button onclick="unlock()">Enter</button>
</div>

<!-- MAIN -->
<div id="main">

<div id="intro">“Some people come quietly… and become everything.”</div>

<h1>Happy Birthday Sakshee ❤️</h1>

<div id="text"></div>

<div class="section">
    <h2>Our Moments 📸</h2>
    <div class="slideshow">
        <img src="https://i.postimg.cc/QxzpqtZK/Snapchat-679765657.jpg"
        <img src="phojpg">
        <img src="photo3.jpg">
    </div>
</div>

<div class="section">
    <h2>What I See In You</h2>
    <p>You hide your feelings… but I notice them anyway.</p>
</div>

<div class="section">
    <h2>One Thing I Want</h2>
    <p>Just be real with me. That’s all I’ll ever need.</p>
</div>

<p style="margin-top:80px;opacity:0.6;">Scroll till the end… I’m still here ❤️</p>

<!-- SECRET -->
<div id="secret" onclick="secretMsg()">tap me</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<audio id="voice">
    <source src="voice.mp3" type="audio/mp3">
</audio>

</div>

<script>

/* UNLOCK */
function unlock() {
    if(document.getElementById("pass").value === "sakshee") {
        document.getElementById("lock").style.opacity = "0";
        setTimeout(()=>{
            document.getElementById("lock").style.display="none";
            document.getElementById("main").style.display="block";
        },1000);

        document.getElementById("music").play();
        document.getElementById("voice").play();

        typeText();
        slide();
        hearts();
    }
}

/* MESSAGE */
let msg = `PASTE YOUR FULL MESSAGE HERE`;
let i=0;
function typeText(){
    if(i<msg.length){
        document.getElementById("text").innerHTML+=msg.charAt(i);
        i++;
        setTimeout(typeText,20);
    }
}

/* SLIDES */
let s=0;
function slide(){
    let imgs=document.querySelectorAll(".slideshow img");
    imgs.forEach(i=>i.style.display="none");
    s++;
    if(s>imgs.length) s=1;
    imgs[s-1].style.display="block";
    setTimeout(slide,3000);
}

/* HEARTS */
function hearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.innerHTML="❤️";
        h.className="heart";
        h.style.left=Math.random()*100+"vw";
        h.style.fontSize=(10+Math.random()*20)+"px";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },300);
}

/* SECRET */
function secretMsg(){
    alert("No matter what… I’m not going anywhere.");
}

/* SCROLL */
window.addEventListener("scroll",()=>{
    document.querySelectorAll(".section").forEach(sec=>{
        let pos=sec.getBoundingClientRect().top;
        if(pos<window.innerHeight-100) sec.classList.add("show");
    });
});

/* STARS */
let c=document.getElementById("stars");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;

let stars=Array(120).fill().map(()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*2
}));

function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle="white";
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });
}
setInterval(draw,50);

</script>

</body>
</html>
